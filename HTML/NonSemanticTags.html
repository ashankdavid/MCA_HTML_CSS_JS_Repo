<!DOCTYPE html>
<html>
    <head>
        <title>Non Semantic Example</title>
    </head>
    <body>
        <!-- Non Semantic Tags-->
        <div>This is a div</div>
        <div>This is another div</div>
        <span>THis is a span</span>

        <!--(P) is Semantic tag-->

    </body>
</html>
