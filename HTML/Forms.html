<!DOCTYPE html>
<html>
    <head>
        <title>HTML Forms</title>
    </head>
    <body>
        <form>
            <label>Name</label>
            <input type="text">
            <br><br>
            <label>Email</label>
            <input type="email">
            <br><br>
            <label>Password</label>
            <input type="password">
            <br><br>
            <label>Gender</label>
            <input type="radio" name="a"> Male
            <input type="radio" name="a"> Female
            <br><br>
            <label>Skills</label>
            <input type="checkbox"> HTML
            <input type="checkbox"> Java
            <input type="checkbox"> CSS
            <br><br>
            <label>Hobbies</label>
            <select>
                <option>Dancing</option>
                <option>Playing</option>
            </select>
            <br><br>
            <input type="submit">
        </form>
    </body>
</html>
