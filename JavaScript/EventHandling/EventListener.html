<!DOCTYPE html>
<html>
    <head>
        <title>Event Listner Handling</title>
    </head>
    <body>
        <button id="btn">Click Me!</button>
        <script>
            let element = document.getElementById("btn");

            // 1st event
            element.addEventListener("click", function(){
                alert("Button Clicked!")
            });
            
            // same 1st event
            element.addEventListener("click", function(){
                alert("Hello Students!")
            });

        </script>
    </body>
</html>
