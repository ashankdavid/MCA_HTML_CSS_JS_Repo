<!DOCTYPE html>
<html>
    <head>
        <title>Grid Example</title>
        <style>
            .container{
                font-size:30px;
                display: grid;
                grid-template-columns: auto auto;
            }

            .container div{
                font-size: 50px;
                border: 3px solid black;
                margin: 10px;
                background-color: aquamarine;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div>Item 1</div>
            <div>Item 2</div>
            <div>Item 3</div>
            <div>Item 4</div>
            <div>Item 5</div>
            <div>Item 6</div>
            <div>Item 7</div>
            <div>Item 8</div>
            <div>Item 9</div>
        </div>
    </body>
</html>
